services:
  postgres:
    image: postgres:alpine3.23
    container_name: postgres
    environment:
      - POSTGRES_PASSWORD=5432
      - POSTGRES_USER=postgres
      - POSTGRES_DB=RestApi
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql
  goose:
    image: kukymbr/goose-docker:3.27.0
    container_name: goose
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=host=postgres port=5432 user=postgres password=5432 dbname=RestApi
volumes:
  postgres-data:
