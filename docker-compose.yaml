services:
  postgres:
    image: postgres:alpine3.23
    container_name: postgres
    environment:
      - POSTGRES_PASSWORD=5432
      - POSTGRES_USER=postgres
      - POSTGRES_DB=RestApi
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  goose:
    image: kukymbr/goose-docker:3.27.0
    container_name: goose
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=host=postgres port=5432 user=postgres password=5432 dbname=RestApi
    volumes:
      - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rest-api
    ports:
      - 8080:8080
    depends_on:
      goose:
        condition: service_completed_successfully

volumes:
  postgres-data:
